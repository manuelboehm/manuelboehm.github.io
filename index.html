<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bald verfügbar</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #f5f2eb;
      --ink: #1a1814;
      --accent: #c8503a;
      --muted: #9a9489;
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: grid;
      place-items: center;
      overflow: hidden;
    }

    /* Subtle grain texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 10;
    }

    .container {
      text-align: center;
      padding: 2rem;
      opacity: 0;
      transform: translateY(16px);
      animation: fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) 0.2s forwards;
    }

    .eyebrow {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      font-weight: 300;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 2rem;
    }

    .eyebrow span {
      display: inline-block;
      animation: blink 1.2s step-end infinite;
    }

    h1 {
      font-family: 'Instrument Serif', serif;
      font-size: clamp(2.8rem, 8vw, 6rem);
      font-weight: 400;
      line-height: 1.05;
      letter-spacing: -0.02em;
      margin-bottom: 1.5rem;
    }

    h1 em {
      font-style: italic;
      color: var(--accent);
    }

    .divider {
      width: 40px;
      height: 1px;
      background: var(--accent);
      margin: 0 auto 1.5rem;
      opacity: 0;
      animation: fadeUp 0.8s ease 0.7s forwards;
    }

    .subtitle {
      font-size: 0.78rem;
      font-weight: 300;
      color: var(--muted);
      letter-spacing: 0.08em;
      opacity: 0;
      animation: fadeUp 0.8s ease 0.9s forwards;
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="container">
    <p class="eyebrow">● <span>In Arbeit</span></p>
    <h1>Hier entsteht<br><em>bald</em> eine Webseite</h1>
    <div class="divider"></div>
    <p class="subtitle">manuelboehm.com</p>
  </div>
</body>
</html>
